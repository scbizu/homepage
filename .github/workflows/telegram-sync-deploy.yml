name: Channel Sync Deploy

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - telegram-sync
      - discord-sync
  workflow_dispatch:

concurrency:
  group: channel-sync-deploy
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync channel feeds
        env:
          DISCORD_GIST_RAW_URL: ${{ secrets.DISCORD_GIST_RAW_URL }}
        run: bun run sync:channels

      - name: Build homepage
        run: bun run build

      - name: Deploy homepage worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy
